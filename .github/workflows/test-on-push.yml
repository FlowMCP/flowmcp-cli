name: Run Tests on Push

on: push

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        env:
          # Runner has no SSH key; npm resolves github: deps to ssh:// and
          # isolates GIT_CONFIG_GLOBAL, so `git config --global` is ignored.
          # GIT_CONFIG_* env vars are always honoured -> rewrite ssh -> https
          # (anonymous https works for the public FlowMCP deps).
          GIT_CONFIG_COUNT: "2"
          GIT_CONFIG_KEY_0: "url.https://github.com/.insteadOf"
          GIT_CONFIG_VALUE_0: "ssh://git@github.com/"
          GIT_CONFIG_KEY_1: "url.https://github.com/.insteadOf"
          GIT_CONFIG_VALUE_1: "git@github.com:"

      - name: Run Jest tests (with coverage)
        run: npm run test:coverage:src

      - name: Upload coverage to Codecov (OIDC)
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          flags: unittests
